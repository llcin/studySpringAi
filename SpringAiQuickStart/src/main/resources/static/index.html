<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .chat-box {
            width: min(720px, calc(100vw - 32px));
            padding: 24px;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .tip {
            margin: 0 0 20px;
            color: #6b7280;
        }

        textarea {
            width: 100%;
            height: 110px;
            box-sizing: border-box;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            resize: vertical;
            font-size: 16px;
            outline: none;
        }

        textarea:focus {
            border-color: #2563eb;
        }

        button {
            margin-top: 12px;
            padding: 10px 18px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .answer {
            margin-top: 18px;
            min-height: 120px;
            padding: 16px;
            border-radius: 12px;
            background: #f9fafb;
            white-space: pre-wrap;
            line-height: 1.7;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <h1>Spring AI 最简单聊天 Demo</h1>
    <p class="tip">输入一句话，调用后端 <code>/ai/chat</code>，让 DeepSeek 返回回答。</p>

    <textarea id="message">用三句话介绍一下 Spring AI 是什么</textarea>
    <br>
    <button id="sendBtn" onclick="sendMessage()">发送</button>

    <div id="answer" class="answer">回答会显示在这里...</div>
</div>

<script>
    async function sendMessage() {
        const message = document.getElementById('message').value.trim();
        const answer = document.getElementById('answer');
        const sendBtn = document.getElementById('sendBtn');

        if (!message) {
            answer.textContent = '请输入问题';
            return;
        }

        sendBtn.disabled = true;
        answer.textContent = '大模型思考中...';

        try {
            const response = await fetch('/ai/chat?message=' + encodeURIComponent(message));
            if (!response.ok) {
                throw new Error('请求失败：' + response.status);
            }
            answer.textContent = await response.text();
        } catch (error) {
            answer.textContent = '调用失败：' + error.message;
        } finally {
            sendBtn.disabled = false;
        }
    }
</script>
</body>
</html>
